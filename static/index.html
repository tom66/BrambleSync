<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrambleSync</title>
    <script src="/static/tailwindcss.js"></script>
    <style>
        html, body {
            height: 100%;
            height: 100dvh; 
            overscroll-behavior-y: none;
            overflow: hidden;
        }
        .selected { background-color: #3b82f6 !important; color: white; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .scrollable-pane { overscroll-behavior-y: contain; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 flex flex-col p-4 font-sans">

    <header class="mb-4 shrink-0 flex justify-between items-end">
        <h1 class="text-2xl font-bold text-blue-400">BrambleSync</h1>
    </header>

    <main class="flex-1 flex flex-col md:flex-row gap-4 overflow-hidden min-h-0">
        
        <!-- Left Pane -->
        <div class="flex-1 flex flex-col bg-gray-800 rounded-lg border border-gray-700 overflow-hidden">
            <div class="p-2 bg-gray-700 flex justify-between items-center border-b border-gray-600 shrink-0">
                <div class="text-sm font-mono overflow-x-auto whitespace-nowrap no-scrollbar mr-2" id="left-path">/</div>
                <button onclick="createFolder('left')" class="bg-green-600 hover:bg-green-500 text-white text-xs px-2 py-1 rounded font-bold shrink-0 shadow">+ Folder</button>
            </div>
            <div class="flex-1 overflow-y-auto p-2 scrollable-pane" id="left-pane"></div>
        </div>

        <!-- Operations -->
        <div class="flex flex-wrap md:flex-col justify-center gap-2 p-2 bg-gray-800 rounded-lg shrink-0">
            <button onclick="performOp('copy', 'left', 'right')" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded text-sm font-bold shadow flex items-center justify-center gap-1">
                Copy 
                <span class="md:hidden">&darr;</span>
                <span class="hidden md:inline">&rarr;</span>
            </button>
            
            <button onclick="performOp('copy', 'right', 'left')" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded text-sm font-bold shadow flex items-center justify-center gap-1">
                <span class="md:hidden">&uarr;</span>
                <span class="hidden md:inline">&larr;</span>
                Copy
            </button>
            
            <div class="w-full h-px md:h-px md:w-full bg-gray-600 my-1 hidden md:block"></div>
            
            <button onclick="performOp('move', 'left', 'right')" class="px-4 py-2 bg-purple-600 hover:bg-purple-500 rounded text-sm font-bold shadow flex items-center justify-center gap-1">
                Move 
                <span class="md:hidden">&darr;</span>
                <span class="hidden md:inline">&rarr;</span>
            </button>
            
            <button onclick="performOp('move', 'right', 'left')" class="px-4 py-2 bg-purple-600 hover:bg-purple-500 rounded text-sm font-bold shadow flex items-center justify-center gap-1">
                <span class="md:hidden">&uarr;</span>
                <span class="hidden md:inline">&larr;</span>
                Move
            </button>
        </div>

        <!-- Right Pane -->
        <div class="flex-1 flex flex-col bg-gray-800 rounded-lg border border-gray-700 overflow-hidden">
            <div class="p-2 bg-gray-700 flex justify-between items-center border-b border-gray-600 shrink-0">
                <div class="text-sm font-mono overflow-x-auto whitespace-nowrap no-scrollbar mr-2" id="right-path">/</div>
                <button onclick="createFolder('right')" class="bg-green-600 hover:bg-green-500 text-white text-xs px-2 py-1 rounded font-bold shrink-0 shadow">+ Folder</button>
            </div>
            <div class="flex-1 overflow-y-auto p-2 scrollable-pane" id="right-pane"></div>
        </div>

    </main>

    <!-- Progress Dashboard -->
    <div id="jobs-container" class="mt-4 space-y-2 overflow-y-auto scrollable-pane shrink-0 max-h-40 no-scrollbar"></div>

    <script>
        let state = {
            left: { path: getCookie('leftPath') || '/', selected: [] },
            right: { path: getCookie('rightPath') || '/', selected: [] }
        };

        function setCookie(name, value) {
            document.cookie = `${name}=${encodeURIComponent(value)}; path=/; max-age=31536000`;
        }
        
        function getCookie(name) {
            const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
            return match ? decodeURIComponent(match[2]) : null;
        }

        function formatSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KiB', 'MiB', 'GiB', 'TiB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        async function loadDir(pane, path) {
            const res = await fetch(`/api/list?path=${encodeURIComponent(path)}`);
            if (!res.ok) return;
            const data = await res.json();
            
            state[pane].path = data.path;
            state[pane].selected = [];
            setCookie(`${pane}Path`, data.path);
            
            document.getElementById(`${pane}-path`).innerText = data.path;
            const container = document.getElementById(`${pane}-pane`);
            container.innerHTML = '';

            data.items.forEach(item => {
                const el = document.createElement('div');
                el.className = 'p-2 hover:bg-gray-700 cursor-pointer rounded flex justify-between items-center select-none gap-2';
                
                const sizeHtml = item.is_dir ? '' : `<span class="text-xs text-gray-400 whitespace-nowrap shrink-0">${formatSize(item.size)}</span>`;
                
                el.innerHTML = `
                    <div class="flex items-center gap-2 overflow-hidden flex-1 min-w-0">
                        <span class="shrink-0">${item.is_dir ? '📁' : '📄'}</span>
                        <span class="overflow-x-auto whitespace-nowrap no-scrollbar flex-1">${item.name}</span>
                    </div>
                    ${sizeHtml}
                `;
                
                el.onclick = (e) => {
                    const selArray = state[pane].selected;
                    const idx = selArray.findIndex(i => i.path === item.path);
                    if (idx > -1) {
                        selArray.splice(idx, 1);
                        el.classList.remove('selected');
                    } else {
                        selArray.push(item);
                        el.classList.add('selected');
                    }
                };

                el.ondblclick = () => {
                    if (item.is_dir) loadDir(pane, item.path);
                };

                el.oncontextmenu = async (e) => {
                    e.preventDefault();
                    const newName = prompt(`Rename ${item.name} to:`, item.name);
                    if (newName && newName !== item.name) {
                        const targetPath = data.path === '/' ? `/${newName}` : `${data.path}/${newName}`;
                        const res = await fetch('/api/rename', {
                            method: 'POST',
                            headers:{'Content-Type': 'application/json'},
                            body: JSON.stringify({ src: item.path, dst: targetPath })
                        });
                        if (!res.ok) {
                            const errData = await res.json();
                            alert("Rename failed: " + errData.error);
                        }
                        loadDir(pane, state[pane].path);
                    }
                };

                container.appendChild(el);
            });
        }

        async function createFolder(pane) {
            const folderName = prompt("Enter new folder name:");
            if (!folderName) return;

            const targetPath = state[pane].path === '/' ? `/${folderName}` : `${state[pane].path}/${folderName}`;
            const res = await fetch('/api/mkdir', {
                method: 'POST',
                headers:{'Content-Type': 'application/json'},
                body: JSON.stringify({ path: targetPath })
            });

            if (!res.ok) {
                const data = await res.json();
                alert("Failed to create folder: " + data.error);
            }
            loadDir(pane, state[pane].path);
        }

        async function performOp(action, fromPane, toPane) {
            const items = state[fromPane].selected;
            if (!items || items.length === 0) return alert("Select at least one file first.");
            
            if (items.some(i => i.is_dir)) {
                return alert("Folder copy/move is not supported yet. Please deselect folders.");
            }

            const promises = items.map(async (item) => {
                const destPath = state[toPane].path === '/' ? `/${item.name}` : `${state[toPane].path}/${item.name}`;
                
                const res = await fetch(`/api/${action}`, {
                    method: 'POST',
                    headers:{'Content-Type': 'application/json'},
                    body: JSON.stringify({ src: item.path, dst: destPath })
                });

                if (!res.ok) {
                    const data = await res.json();
                    console.error(`Failed to queue ${item.name}: ${data.error}`);
                    alert(`Failed to queue ${item.name}: ${data.error}`);
                }
            });

            await Promise.all(promises);

            state[fromPane].selected = [];
            loadDir('left', state.left.path);
            loadDir('right', state.right.path);
        }

        async function cancelJob(jobId) {
            await fetch(`/api/cancel/${jobId}`, { method: 'POST' });
        }

        setInterval(async () => {
            const res = await fetch('/api/jobs');
            const jobs = await res.json();
            const container = document.getElementById('jobs-container');
            container.innerHTML = '';

            Object.entries(jobs).forEach(([id, job]) => {
                let bg = 'bg-gray-800';
                let barColor = 'bg-blue-500';
                
                if (job.status.startsWith('error')) {
                    bg = 'bg-red-900';
                } else if (job.status === 'cancelled') {
                    bg = 'bg-orange-900';
                    barColor = 'bg-orange-500';
                } else if (job.status === 'queued') {
                    barColor = 'bg-gray-500'; 
                } else if (job.status === 'completed') {
                    barColor = 'bg-green-500';
                }
                
                const displayProgress = job.status === 'queued' ? 'Wait...' : Number(job.progress).toFixed(1) + '%';
                
                // Construct the speed and ETA display string if data is available
                let speedEtaStr = '';
                if (job.status === 'running' && job.speed) {
                    speedEtaStr = `${job.speed} | ETA: ${job.eta} | `;
                }
                
                container.innerHTML += `
                    <div class="p-3 ${bg} rounded border border-gray-700">
                        <div class="flex justify-between items-center text-sm mb-2 gap-2">
                            <div class="overflow-x-auto whitespace-nowrap no-scrollbar flex-1 min-w-0 pr-2">
                                <span>${job.file}</span> <span class="text-xs text-gray-400">(${job.status})</span>
                            </div>
                            <div class="flex items-center gap-2 shrink-0">
                                <span class="font-mono text-xs whitespace-nowrap">${speedEtaStr}${displayProgress}</span>
                                ${(job.status === 'running' || job.status === 'queued') ? `
                                    <button onclick="cancelJob('${id}')" 
                                            class="text-red-400 hover:text-red-300 font-bold px-2 py-0.5 rounded bg-gray-900 hover:bg-gray-700 transition shrink-0 ml-1 shadow" 
                                            title="Cancel Transfer">✕</button>
                                ` : ''}
                            </div>
                        </div>
                        <div class="w-full bg-gray-900 rounded-full h-2.5 shadow-inner">
                            <div class="${barColor} h-2.5 rounded-full" style="width: ${job.progress}%"></div>
                        </div>
                    </div>
                `;
            });
        }, 1000);

        loadDir('left', state.left.path);
        loadDir('right', state.right.path);
    </script>
</body>
</html>
