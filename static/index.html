<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrambleSync</title>
    <script src="/static/tailwindcss.js"></script>
    <style>
        .selected { background-color: #3b82f6 !important; color: white; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 h-screen flex flex-col p-4 font-sans">

    <header class="mb-4">
        <h1 class="text-2xl font-bold text-blue-400">BrambleSync</h1>
    </header>

    <main class="flex-1 flex flex-col md:flex-row gap-4 overflow-hidden">
        
        <!-- Left Pane -->
        <div class="flex-1 flex flex-col bg-gray-800 rounded-lg border border-gray-700 overflow-hidden">
            <div class="p-2 bg-gray-700 flex justify-between items-center border-b border-gray-600">
                <div class="text-sm font-mono truncate mr-2" id="left-path">/</div>
                <button onclick="createFolder('left')" class="bg-green-600 hover:bg-green-500 text-white text-xs px-2 py-1 rounded font-bold shrink-0">+ Folder</button>
            </div>
            <div class="flex-1 overflow-y-auto p-2" id="left-pane"></div>
        </div>

        <!-- Operations -->
        <div class="flex md:flex-col justify-center gap-2 p-2 bg-gray-800 rounded-lg shrink-0">
            <button onclick="performOp('copy', 'left', 'right')" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded text-sm font-bold">Copy &rarr;</button>
            <button onclick="performOp('copy', 'right', 'left')" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded text-sm font-bold">&larr; Copy</button>
            <div class="w-px h-full md:h-px md:w-full bg-gray-600 my-1"></div>
            <button onclick="performOp('move', 'left', 'right')" class="px-4 py-2 bg-purple-600 hover:bg-purple-500 rounded text-sm font-bold">Move &rarr;</button>
            <button onclick="performOp('move', 'right', 'left')" class="px-4 py-2 bg-purple-600 hover:bg-purple-500 rounded text-sm font-bold">&larr; Move</button>
        </div>

        <!-- Right Pane -->
        <div class="flex-1 flex flex-col bg-gray-800 rounded-lg border border-gray-700 overflow-hidden">
            <div class="p-2 bg-gray-700 flex justify-between items-center border-b border-gray-600">
                <div class="text-sm font-mono truncate mr-2" id="right-path">/</div>
                <button onclick="createFolder('right')" class="bg-green-600 hover:bg-green-500 text-white text-xs px-2 py-1 rounded font-bold shrink-0">+ Folder</button>
            </div>
            <div class="flex-1 overflow-y-auto p-2" id="right-pane"></div>
        </div>

    </main>

    <!-- Progress Dashboard -->
    <div id="jobs-container" class="mt-4 space-y-2"></div>

    <script>
        let state = {
            left: { path: getCookie('leftPath') || '/', selected: null },
            right: { path: getCookie('rightPath') || '/', selected: null }
        };

        function setCookie(name, value) {
            document.cookie = `${name}=${encodeURIComponent(value)}; path=/; max-age=31536000`;
        }
        
        function getCookie(name) {
            const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
            return match ? decodeURIComponent(match[2]) : null;
        }

        function formatSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KiB', 'MiB', 'GiB', 'TiB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        async function loadDir(pane, path) {
            const res = await fetch(`/api/list?path=${encodeURIComponent(path)}`);
            if (!res.ok) return;
            const data = await res.json();
            
            state[pane].path = data.path;
            state[pane].selected = null;
            setCookie(`${pane}Path`, data.path);
            
            document.getElementById(`${pane}-path`).innerText = data.path;
            const container = document.getElementById(`${pane}-pane`);
            container.innerHTML = '';

            data.items.forEach(item => {
                const el = document.createElement('div');
                el.className = 'p-2 hover:bg-gray-700 cursor-pointer rounded flex justify-between items-center select-none gap-2';
                
                const sizeHtml = item.is_dir ? '' : `<span class="text-xs text-gray-400 whitespace-nowrap shrink-0">${formatSize(item.size)}</span>`;
                
                el.innerHTML = `
                    <div class="flex items-center gap-2 overflow-hidden">
                        <span>${item.is_dir ? '📁' : '📄'}</span>
                        <span class="truncate">${item.name}</span>
                    </div>
                    ${sizeHtml}
                `;
                
                el.onclick = (e) => {
                    Array.from(container.children).forEach(c => c.classList.remove('selected'));
                    el.classList.add('selected');
                    state[pane].selected = item;
                };

                el.ondblclick = () => {
                    if (item.is_dir) loadDir(pane, item.path);
                };

                el.oncontextmenu = async (e) => {
                    e.preventDefault();
                    const newName = prompt(`Rename ${item.name} to:`, item.name);
                    if (newName && newName !== item.name) {
                        const targetPath = data.path === '/' ? `/${newName}` : `${data.path}/${newName}`;
                        const res = await fetch('/api/rename', {
                            method: 'POST',
                            headers:{'Content-Type': 'application/json'},
                            body: JSON.stringify({ src: item.path, dst: targetPath })
                        });
                        if (!res.ok) {
                            const errData = await res.json();
                            alert("Rename failed: " + errData.error);
                        }
                        loadDir(pane, state[pane].path);
                    }
                };

                container.appendChild(el);
            });
        }

        async function createFolder(pane) {
            const folderName = prompt("Enter new folder name:");
            if (!folderName) return;

            const targetPath = state[pane].path === '/' ? `/${folderName}` : `${state[pane].path}/${folderName}`;
            const res = await fetch('/api/mkdir', {
                method: 'POST',
                headers:{'Content-Type': 'application/json'},
                body: JSON.stringify({ path: targetPath })
            });

            if (!res.ok) {
                const data = await res.json();
                alert("Failed to create folder: " + data.error);
            }
            loadDir(pane, state[pane].path);
        }

        async function performOp(action, fromPane, toPane) {
            const item = state[fromPane].selected;
            if (!item || item.is_dir) return alert("Select a file first.");
            
            const destPath = state[toPane].path === '/' ? `/${item.name}` : `${state[toPane].path}/${item.name}`;
            
            const res = await fetch(`/api/${action}`, {
                method: 'POST',
                headers:{'Content-Type': 'application/json'},
                body: JSON.stringify({ src: item.path, dst: destPath })
            });

            if (!res.ok) {
                const data = await res.json();
                alert("Operation failed: " + data.error);
            }

            loadDir('left', state.left.path);
            loadDir('right', state.right.path);
        }

        async function cancelJob(jobId) {
            await fetch(`/api/cancel/${jobId}`, { method: 'POST' });
        }

        setInterval(async () => {
            const res = await fetch('/api/jobs');
            const jobs = await res.json();
            const container = document.getElementById('jobs-container');
            container.innerHTML = '';

            Object.entries(jobs).forEach(([id, job]) => {
                let bg = 'bg-gray-800';
                let barColor = 'bg-blue-500';
                
                if (job.status.startsWith('error')) {
                    bg = 'bg-red-900';
                } else if (job.status === 'cancelled') {
                    bg = 'bg-orange-900';
                    barColor = 'bg-orange-500';
                }

                if (job.status === 'completed') {
                    barColor = 'bg-green-500';
                }
                
                const displayProgress = Number(job.progress).toFixed(1);
                
                container.innerHTML += `
                    <div class="p-3 ${bg} rounded border border-gray-700">
                        <div class="flex justify-between items-center text-sm mb-1">
                            <span>${job.file} (${job.status})</span>
                            <div class="flex items-center gap-4">
                                <span class="font-mono">${job.speed > 0 ? job.speed + ' MB/s | ' : ''}${displayProgress}%</span>
                                ${job.status === 'running' ? `
                                    <button onclick="cancelJob('${id}')" 
                                            class="text-red-400 hover:text-red-300 font-bold px-2 py-0.5 rounded bg-gray-900 hover:bg-gray-700 transition" 
                                            title="Cancel Transfer">✕</button>
                                ` : ''}
                            </div>
                        </div>
                        <div class="w-full bg-gray-900 rounded-full h-2.5">
                            <div class="${barColor} h-2.5 rounded-full" style="width: ${job.progress}%"></div>
                        </div>
                    </div>
                `;
            });
        }, 1000);

        loadDir('left', state.left.path);
        loadDir('right', state.right.path);
    </script>
</body>
</html>
